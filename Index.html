<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Tailor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222;
    --border: #2e2e2e;
    --accent: #c8f04a;
    --accent2: #4af0b8;
    --text: #f0f0ee;
    --muted: #777;
    --danger: #f04a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  header span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(200,240,74,0.08);
    border: 1px solid rgba(200,240,74,0.2);
    border-radius: 4px;
    padding: 2px 8px;
    letter-spacing: 1px;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    height: calc(100vh - 73px);
  }

  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .panel:last-child { border-right: none; }

  .panel-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-shrink: 0;
    background: var(--surface);
  }

  .panel-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .step-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--border);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .step-badge.active {
    background: var(--accent);
    color: #0f0f0f;
  }

  textarea {
    flex: 1;
    background: var(--surface);
    border: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    padding: 20px;
    resize: none;
    outline: none;
    overflow-y: auto;
  }

  textarea::placeholder { color: #444; }
  textarea:focus { background: #1c1c1c; }

  .actions {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    background: var(--bg);
    flex-wrap: wrap;
  }

  button {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #0f0f0f;
  }
  .btn-primary:hover { background: #d4f55a; transform: translateY(-1px); }
  .btn-primary:disabled { background: #333; color: #555; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: #2a2a2a; }
  .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-accent2 {
    background: var(--accent2);
    color: #0f0f0f;
  }
  .btn-accent2:hover { background: #5ff5c0; transform: translateY(-1px); }
  .btn-accent2:disabled { background: #333; color: #555; cursor: not-allowed; transform: none; }

  /* Output panel */
  .output-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  .output-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: var(--surface);
  }

  .output-scroll::-webkit-scrollbar { width: 4px; }
  .output-scroll::-webkit-scrollbar-track { background: transparent; }
  .output-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-card-header {
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-name {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .section-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
  }

  .badge-rewrite { background: rgba(200,240,74,0.1); color: var(--accent); border: 1px solid rgba(200,240,74,0.2); }
  .badge-keep { background: rgba(74,240,184,0.1); color: var(--accent2); border: 1px solid rgba(74,240,184,0.2); }
  .badge-tweak { background: rgba(240,180,74,0.1); color: #f0b44a; border: 1px solid rgba(240,180,74,0.2); }

  .section-card-body { padding: 14px 16px; }

  .section-label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .section-content {
    font-size: 13px;
    line-height: 1.7;
    color: #d0d0cc;
    white-space: pre-wrap;
  }

  .section-divider { margin: 12px 0; border: none; border-top: 1px solid var(--border); }

  .reasoning {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    font-style: italic;
  }

  .status-bar {
    padding: 10px 20px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .status-dot.thinking { background: var(--accent); animation: pulse 1s infinite; }
  .status-dot.done { background: var(--accent2); }
  .status-dot.error { background: var(--danger); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-text {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }

  .empty-icon {
    font-size: 36px;
    opacity: 0.3;
  }

  .empty-text {
    font-size: 13px;
    line-height: 1.6;
    max-width: 260px;
  }

  /* Thinking animation */
  .thinking-block {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
  }

  .thinking-dots span {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  .thinking-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .download-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* Mobile */
  @media (max-width: 700px) {
    .layout {
      grid-template-columns: 1fr;
      height: auto;
    }
    .panel { height: 40vh; }
    .output-panel { height: auto; min-height: 50vh; }
    header { padding: 18px 16px 14px; }
    header h1 { font-size: 20px; }
    .actions { padding: 12px 14px; }
    textarea { padding: 14px; }
    .output-scroll { padding: 14px; }
  }
</style>
</head>
<body>

<header>
  <h1>Resume Tailor</h1>
  <span>AI-POWERED</span>
</header>

<div class="layout">
  <!-- Left: Inputs -->
  <div style="display:flex;flex-direction:column;height:100%;border-right:1px solid var(--border)">

    <!-- Base Resume -->
    <div class="panel-header">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="step-badge active" id="badge1">1</div>
        <span class="panel-label">Base Resume</span>
      </div>
      <button class="btn-secondary" onclick="clearResume()" style="font-size:11px;padding:5px 10px">Clear</button>
    </div>
    <textarea id="resumeInput" placeholder="Paste your full base resume here. This is your master copy — it will never be modified. Each tailoring starts fresh from this text.

Example structure:
JOHN DOE
john@email.com | LinkedIn | GitHub

SUMMARY
Experienced software engineer with 5+ years...

EXPERIENCE
Senior Developer — Acme Corp (2021–present)
• Built scalable APIs serving 10M+ requests/day
...

SKILLS
Python, JavaScript, React, AWS...

EDUCATION
B.Sc. Computer Science, MIT, 2019" style="height:40%"></textarea>

    <!-- Job Description -->
    <div class="panel-header" style="border-top:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="step-badge" id="badge2">2</div>
        <span class="panel-label">Job Description</span>
      </div>
    </div>
    <textarea id="jdInput" placeholder="Paste the full job description here.

Include everything: role title, responsibilities, required skills, nice-to-haves, company description. The more detail, the better the tailoring." style="flex:1"></textarea>

    <div class="actions">
      <button class="btn-primary" id="analyzeBtn" onclick="analyze()">✦ Tailor Resume</button>
      <button class="btn-secondary" onclick="clearAll()">Reset</button>
    </div>
  </div>

  <!-- Right: Output -->
  <div class="output-panel">
    <div class="panel-header">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="step-badge" id="badge3">3</div>
        <span class="panel-label">Tailored Sections</span>
      </div>
      <div id="dlRow" style="display:none" class="download-row">
        <button class="btn-accent2" onclick="downloadDocx()">↓ Download .docx</button>
      </div>
    </div>

    <div class="output-scroll" id="outputArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">◈</div>
        <div class="empty-text">Paste your resume and a job description, then click <strong>Tailor Resume</strong> to get section-by-section rewrites.</div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Ready</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.8.2/docx.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>
let lastResult = null;

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  dot.className = 'status-dot' + (state ? ' ' + state : '');
  statusText.textContent = text;
}

function clearResume() {
  document.getElementById('resumeInput').value = '';
}

function clearAll() {
  document.getElementById('resumeInput').value = '';
  document.getElementById('jdInput').value = '';
  document.getElementById('outputArea').innerHTML = `<div class="empty-state" id="emptyState">
    <div class="empty-icon">◈</div>
    <div class="empty-text">Paste your resume and a job description, then click <strong>Tailor Resume</strong> to get section-by-section rewrites.</div>
  </div>`;
  document.getElementById('dlRow').style.display = 'none';
  document.getElementById('badge2').className = 'step-badge';
  document.getElementById('badge3').className = 'step-badge';
  lastResult = null;
  setStatus('', 'Ready');
}

async function analyze() {
  const resume = document.getElementById('resumeInput').value.trim();
  const jd = document.getElementById('jdInput').value.trim();

  if (!resume) { alert('Please paste your base resume first.'); return; }
  if (!jd) { alert('Please paste the job description.'); return; }

  document.getElementById('badge2').className = 'step-badge active';
  document.getElementById('badge3').className = 'step-badge';
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('dlRow').style.display = 'none';
  lastResult = null;

  const outputArea = document.getElementById('outputArea');
  outputArea.innerHTML = `
    <div class="thinking-block">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      <span class="thinking-label">Analyzing job description and tailoring sections…</span>
    </div>`;

  setStatus('thinking', 'Calling Claude AI…');

  const systemPrompt = `You are an expert resume coach. Given a base resume and a job description, you analyze which sections need rewriting to best match the role.

Your job is to return a JSON object (no markdown, no code fences — raw JSON only) with this structure:

{
  "job_title": "Job title you're tailoring for",
  "sections": [
    {
      "section": "Section name (e.g. Summary, Skills, Experience - Job Title at Company)",
      "action": "rewrite" | "tweak" | "keep",
      "reasoning": "1-2 sentences on why",
      "original": "The original text from the resume for this section",
      "tailored": "The new tailored text (or same as original if action is keep)"
    }
  ],
  "keywords_added": ["list", "of", "key", "terms", "inserted"],
  "overall_tip": "One practical tip for the application"
}

Rules:
- action "rewrite" = substantial change needed
- action "tweak" = minor wording/keyword adjustment
- action "keep" = section is already well-matched
- For "keep" sections, tailored = original
- Always keep formatting style consistent with the resume (bullet points if original used bullets, etc.)
- Never fabricate experience or credentials. Only reframe/rephrase what's already there.
- Be specific and concrete in rewrites. Use keywords from the JD naturally.
- Cover every major section of the resume.`;

  const userPrompt = `BASE RESUME:
${resume}

JOB DESCRIPTION:
${jd}

Analyze and return the JSON.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API error');
    }

    const data = await response.json();
    const rawText = data.content.map(b => b.text || '').join('').trim();

    // Strip any accidental markdown fences
    const clean = rawText.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/,'').trim();
    const result = JSON.parse(clean);

    lastResult = { result, resume };
    renderResult(result);
    setStatus('done', `Done · ${result.sections.length} sections reviewed`);
    document.getElementById('badge3').className = 'step-badge active';
    document.getElementById('dlRow').style.display = 'flex';

  } catch (err) {
    outputArea.innerHTML = `<div class="section-card" style="border-color:var(--danger)">
      <div class="section-card-header"><span class="section-name" style="color:var(--danger)">Error</span></div>
      <div class="section-card-body"><div class="section-content">${err.message}</div></div>
    </div>`;
    setStatus('error', 'Error — see output');
  }

  document.getElementById('analyzeBtn').disabled = false;
}

function renderResult(result) {
  const outputArea = document.getElementById('outputArea');
  outputArea.innerHTML = '';

  // Job title banner
  const banner = document.createElement('div');
  banner.style.cssText = 'margin-bottom:16px;padding:12px 16px;background:rgba(200,240,74,0.05);border:1px solid rgba(200,240,74,0.15);border-radius:8px;display:flex;align-items:center;gap:10px';
  banner.innerHTML = `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Tailoring for</span>
    <span style="font-size:14px;font-weight:600;color:var(--accent)">${result.job_title}</span>`;
  outputArea.appendChild(banner);

  // Sections
  result.sections.forEach(sec => {
    const card = document.createElement('div');
    card.className = 'section-card';

    const badgeClass = sec.action === 'rewrite' ? 'badge-rewrite' : sec.action === 'tweak' ? 'badge-tweak' : 'badge-keep';
    const actionLabel = sec.action === 'rewrite' ? '↻ REWRITE' : sec.action === 'tweak' ? '~ TWEAK' : '✓ KEEP';

    card.innerHTML = `
      <div class="section-card-header">
        <span class="section-name">${sec.section}</span>
        <span class="section-badge ${badgeClass}">${actionLabel}</span>
      </div>
      <div class="section-card-body">
        ${sec.action !== 'keep' ? `
          <div class="section-label">Original</div>
          <div class="section-content" style="color:var(--muted);text-decoration-line:${sec.action==='rewrite'?'line-through':'none'};text-decoration-color:#444">${sec.original}</div>
          <hr class="section-divider">
          <div class="section-label">Tailored</div>
          <div class="section-content">${sec.tailored}</div>
          <hr class="section-divider">
        ` : `
          <div class="section-content" style="color:var(--muted)">${sec.original}</div>
          <hr class="section-divider">
        `}
        <div class="reasoning">💬 ${sec.reasoning}</div>
      </div>`;
    outputArea.appendChild(card);
  });

  // Keywords & tip
  if (result.keywords_added?.length) {
    const kw = document.createElement('div');
    kw.className = 'section-card';
    kw.innerHTML = `
      <div class="section-card-header"><span class="section-name">Keywords Added</span></div>
      <div class="section-card-body">
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${result.keywords_added.map(k => `<span style="background:rgba(74,240,184,0.08);border:1px solid rgba(74,240,184,0.2);color:var(--accent2);border-radius:4px;padding:3px 9px;font-family:'DM Mono',monospace;font-size:11px">${k}</span>`).join('')}
        </div>
      </div>`;
    outputArea.appendChild(kw);
  }

  if (result.overall_tip) {
    const tip = document.createElement('div');
    tip.className = 'section-card';
    tip.style.borderColor = 'rgba(74,240,184,0.2)';
    tip.innerHTML = `
      <div class="section-card-header" style="background:rgba(74,240,184,0.04)"><span class="section-name" style="color:var(--accent2)">Tip</span></div>
      <div class="section-card-body"><div class="section-content">${result.overall_tip}</div></div>`;
    outputArea.appendChild(tip);
  }
}

async function downloadDocx() {
  if (!lastResult) return;
  const { result, resume } = lastResult;

  // Build the tailored resume text by replacing sections
  // We'll create a clean docx with all tailored content
  const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType } = docx;

  const lines = [];

  // Header from original resume (first few lines before first section)
  const resumeLines = resume.split('\n');
  let inHeader = true;
  const headerLines = [];
  const sectionMap = {};

  result.sections.forEach(s => {
    sectionMap[s.section.toLowerCase()] = s.tailored || s.original;
  });

  // Build doc paragraphs from the tailored content
  const paragraphs = [];

  result.sections.forEach(sec => {
    // Section heading
    paragraphs.push(new Paragraph({
      children: [new TextRun({ text: sec.section.toUpperCase(), bold: true, size: 26, color: '222222', font: 'Calibri' })],
      spacing: { before: 240, after: 80 },
      border: { bottom: { style: 'single', size: 6, color: 'BBBBBB', space: 4 } }
    }));

    // Content
    const content = sec.tailored || sec.original;
    content.split('\n').forEach(line => {
      if (!line.trim()) return;
      const isBullet = line.trim().startsWith('•') || line.trim().startsWith('-') || line.trim().startsWith('*');
      paragraphs.push(new Paragraph({
        children: [new TextRun({ text: isBullet ? line.replace(/^[\•\-\*]\s*/, '') : line, size: 22, font: 'Calibri' })],
        bullet: isBullet ? { level: 0 } : undefined,
        spacing: { after: 60 }
      }));
    });

    paragraphs.push(new Paragraph({ children: [] }));
  });

  // Add tip at end
  paragraphs.push(new Paragraph({
    children: [new TextRun({ text: `Tailored for: ${result.job_title}`, size: 18, color: '888888', italics: true })],
    spacing: { before: 200 }
  }));

  const doc = new Document({
    sections: [{
      properties: {
        page: {
          size: { width: 12240, height: 15840 },
          margin: { top: 1080, right: 1080, bottom: 1080, left: 1080 }
        }
      },
      children: paragraphs
    }]
  });

  const blob = await Packer.toBlob(doc);
  const safeName = (result.job_title || 'resume').replace(/[^a-z0-9]/gi, '_').toLowerCase();
  saveAs(blob, `resume_${safeName}.docx`);
}
</script>
</body>
</html>
